[coverage:run]
omit =
    .venv/*
    tests/*
branch = true
concurrency = thread,greenlet

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    if TYPE_CHECKING:
# fail_under = 95
show_missing = True
skip_covered = False

[tool:pytest]
addopts =
    -ra
    --log-level=DEBUG
    --showlocals
    --verbose
    --cov-report=html:htmlcov/status.html
    --cov=./

[pylint.]
good-names = i,j,k,e,x,_,pk,id
max-args = 5
max-attributes = 10
max-bool-expr = 5
max-module-lines = 300
max-nested-blocks = 2
max-public-methods = 30
max-returns = 5
max-statements = 30
ignored-classes = 
    contextlib.closing
disable =
    no-member,
    no-self-argument,
    import-error,
    too-few-public-methods,
    duplicate-code,
    missing-docstring,
    redefined-outer-name,
    no-name-in-module,
    unspecified-encoding,
    raise-missing-from,
    fixme,
    too-many-locals
extension-pkg-allow-list = ["pydantic"]

[mypy]
plugins = pydantic.mypy
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true

[mypy-tests.*]
disallow_incomplete_defs = False
disallow_untyped_defs = False